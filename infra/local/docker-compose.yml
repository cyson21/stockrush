# 로컬 개발/CI에서 공통으로 재사용할 인프라 조각(Postgres/Redis/Kafka)을 구성합니다.
services:
  postgres:
    image: postgres:16-alpine
    container_name: stockrush-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stockrush}
      POSTGRES_USER: ${POSTGRES_USER:-stockrush}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockrush}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - stockrush-postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-stockrush} -d $${POSTGRES_DB:-stockrush}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: stockrush-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - stockrush-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:4.2.0
    container_name: stockrush-kafka
    hostname: kafka
    ports:
      - "${KAFKA_HOST_PORT:-19092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_LISTENERS: "CONTROLLER://:29093,PLAINTEXT://:19092,PLAINTEXT_HOST://:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT:-19092}"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 20

  kafka-init:
    image: apache/kafka:4.2.0
    container_name: stockrush-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka/topics.sh:/opt/stockrush/topics.sh:ro
    command: ["sh", "/opt/stockrush/topics.sh"]
    restart: "no"

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: stockrush-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: stockrush-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "${KAFKA_UI_PORT:-19090}:8080"

volumes:
  stockrush-postgres-data:
  stockrush-redis-data:

