# 기본 DB/Keycloak 비밀값을 네임스페이스 내 secret으로 주입합니다.
apiVersion: v1
kind: Secret
metadata:
  name: stockrush-demo-secret
type: Opaque
stringData:
  POSTGRES_USER: stockrush
  POSTGRES_PASSWORD: stockrush
  SPRING_DATASOURCE_USERNAME: stockrush
  SPRING_DATASOURCE_PASSWORD: stockrush
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: admin
