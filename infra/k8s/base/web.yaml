      containers:
        - name: admin-app
          image: ghcr.io/cyson21/stockrush-admin-app:latest-demo
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: admin-app
  labels:
    app.kubernetes.io/name: admin-app
    app.kubernetes.io/part-of: stockrush
spec:
  selector:
    app.kubernetes.io/name: admin-app
