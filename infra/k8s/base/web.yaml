# 고객/관리자 웹앱을 배포해 데모 UI 경로를 동일 네임스페이스에 노출합니다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-app
  labels:
    app.kubernetes.io/name: customer-app
    app.kubernetes.io/part-of: stockrush
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: customer-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: customer-app
        app.kubernetes.io/part-of: stockrush
    spec:
      containers:
        - name: customer-app
          image: ghcr.io/cyson21/stockrush-customer-app:latest-demo
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: customer-app
  labels:
    app.kubernetes.io/name: customer-app
    app.kubernetes.io/part-of: stockrush
spec:
  selector:
    app.kubernetes.io/name: customer-app
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-app
  labels:
    app.kubernetes.io/name: admin-app
    app.kubernetes.io/part-of: stockrush
spec:
