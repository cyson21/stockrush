# Kafka 토픽 초기화 작업을 init job으로 분리해 배포 순서를 안정화합니다.
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-init
  labels:
    app.kubernetes.io/name: kafka-init
    app.kubernetes.io/part-of: stockrush
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-init
        app.kubernetes.io/part-of: stockrush
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kafka-init
          image: apache/kafka:4.2.0
          env:
            - name: BOOTSTRAP_SERVER
              value: kafka:19092
          command:
            - sh
            - -ec
            - |
              until /opt/kafka/bin/kafka-topics.sh --bootstrap-server "$BOOTSTRAP_SERVER" --list >/dev/null 2>&1; do
                echo "waiting for kafka"
                sleep 2
              done
              sh /opt/stockrush/topics.sh
          volumeMounts:
            - name: kafka-topics-script
              mountPath: /opt/stockrush/topics.sh
              subPath: topics.sh
      volumes:
        - name: kafka-topics-script
          configMap:
            name: kafka-topics-script
