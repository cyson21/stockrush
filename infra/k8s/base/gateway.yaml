apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: stockrush
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/part-of: stockrush
    spec:
      containers:
        - name: gateway
          image: ghcr.io/cyson21/stockrush-gateway:latest-demo
          ports:
            - name: http
              containerPort: 18080
          envFrom:
            - configMapRef:
                name: stockrush-demo-config
          env:
            - name: GATEWAY_PORT
              value: "18080"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: stockrush
spec:
  selector:
    app.kubernetes.io/name: gateway
  ports:
    - name: http
      port: 18080
      targetPort: http
