# backend 서비스군 배포 템플릿을 묶어 앱별 리소스를 일괄 관리합니다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  labels:
    app.kubernetes.io/name: catalog-service
    app.kubernetes.io/part-of: stockrush
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-service
        app.kubernetes.io/part-of: stockrush
    spec:
      containers:
        - name: catalog-service
          image: ghcr.io/cyson21/stockrush-catalog-service:latest-demo
          ports:
            - name: http
              containerPort: 18081
          envFrom:
            - configMapRef:
                name: stockrush-demo-config
            - secretRef:
                name: stockrush-demo-secret
          env:
            - name: SERVER_PORT
              value: "18081"
            - name: CATALOG_SERVICE_PORT
              value: "18081"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/stockrush?currentSchema=catalog
            - name: SPRING_FLYWAY_SCHEMAS
              value: catalog
            - name: SPRING_FLYWAY_DEFAULT_SCHEMA
              value: catalog
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: validate
            - name: SPRING_JPA_OPEN_IN_VIEW
              value: "false"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  labels:
    app.kubernetes.io/name: catalog-service
    app.kubernetes.io/part-of: stockrush
spec:
  selector:
    app.kubernetes.io/name: catalog-service
  ports:
    - name: http
      port: 18081
      targetPort: http
---
