              value: validate
            - name: SPRING_JPA_OPEN_IN_VIEW
              value: "false"
            - name: STOCKRUSH_OUTBOX_RELAY_ENABLED
              value: "true"
            - name: STOCKRUSH_OUTBOX_RELAY_FIXED_DELAY_MS
              value: "3000"
            - name: STOCKRUSH_OUTBOX_RELAY_INITIAL_DELAY_MS
