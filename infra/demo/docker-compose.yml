name: stockrush-demo

x-backend-build: &backend-build
  context: ../..
  dockerfile: services/Dockerfile

x-backend-env: &backend-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-stockrush}
  POSTGRES_USER: ${POSTGRES_USER:-stockrush}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockrush}
  KAFKA_BOOTSTRAP_SERVERS: kafka:19092
  SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-stockrush}
  SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-stockrush}
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
  STOCKRUSH_KAFKA_LISTENERS_ENABLED: "true"

x-demo-keycloak: &demo-keycloak
  STOCKRUSH_SECURITY_ISSUER_URI: http://localhost:${KEYCLOAK_HOST_PORT:-28088}/realms/stockrush
  STOCKRUSH_SECURITY_JWK_SET_URI: http://keycloak:8080/realms/stockrush/protocol/openid-connect/certs

x-infra-deps: &infra-deps
  postgres:
    condition: service_healthy
  kafka-init:
    condition: service_completed_successfully

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stockrush}
      POSTGRES_USER: ${POSTGRES_USER:-stockrush}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockrush}
    ports:
      - "${POSTGRES_HOST_PORT:-25432}:5432"
    volumes:
      - stockrush-demo-postgres-data:/var/lib/postgresql/data
      - ../local/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-stockrush} -d $${POSTGRES_DB:-stockrush}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-26379}:6379"
    volumes:
      - stockrush-demo-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:4.2.0
    hostname: kafka
    ports:
      - "${KAFKA_HOST_PORT:-29092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_LISTENERS: "CONTROLLER://:29093,PLAINTEXT://:19092,PLAINTEXT_HOST://:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT:-29092}"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20

  kafka-init:
    image: apache/kafka:4.2.0
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ../local/kafka/topics.sh:/opt/stockrush/topics.sh:ro
    command: ["sh", "/opt/stockrush/topics.sh"]
    restart: "no"

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: stockrush-demo
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "${KAFKA_UI_PORT:-29090}:8080"

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: http://localhost:${KEYCLOAK_HOST_PORT:-28088}
      KC_METRICS_ENABLED: "false"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_HOST_PORT:-28088}:8080"
    volumes:
      - ../demo/keycloak/stockrush-realm.json:/opt/keycloak/data/import/stockrush-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/9000; printf \"GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200 OK\" <&3'"]
      interval: 10s
      timeout: 5s
      retries: 24

  catalog-service:
    build:
      <<: *backend-build
      args:
        SERVICE_DIR: services/catalog-service
        SERVICE_PORT: 18081
    environment:
      <<: *backend-env
      SERVER_PORT: 18081
      CATALOG_SERVICE_PORT: 18081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-stockrush}?currentSchema=catalog
      SPRING_FLYWAY_SCHEMAS: catalog
      SPRING_FLYWAY_DEFAULT_SCHEMA: catalog
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_OPEN_IN_VIEW: "false"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${CATALOG_HOST_PORT:-28081}:18081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18081/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  inventory-service:
    build:
      <<: *backend-build
      args:
        SERVICE_DIR: services/inventory-service
        SERVICE_PORT: 18082
    environment:
      <<: *backend-env
      SERVER_PORT: 18082
      INVENTORY_SERVICE_PORT: 18082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-stockrush}?currentSchema=inventory
      SPRING_FLYWAY_SCHEMAS: inventory
      SPRING_FLYWAY_DEFAULT_SCHEMA: inventory
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_OPEN_IN_VIEW: "false"
      STOCKRUSH_OUTBOX_RELAY_ENABLED: "true"
      STOCKRUSH_OUTBOX_RELAY_FIXED_DELAY_MS: 3000
      STOCKRUSH_OUTBOX_RELAY_INITIAL_DELAY_MS: 1000
      STOCKRUSH_OUTBOX_RELAY_BATCH_SIZE: 50
    depends_on: *infra-deps
    ports:
      - "${INVENTORY_HOST_PORT:-28082}:18082"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18082/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  order-service:
    build:
      <<: *backend-build
      args:
        SERVICE_DIR: services/order-service
        SERVICE_PORT: 18083
    environment:
      <<: *backend-env
      SERVER_PORT: 18083
      ORDER_SERVICE_PORT: 18083
      PROMOTION_SERVICE_URL: http://promotion-service:18085
      STOCKRUSH_CLIENTS_PROMOTION_SERVICE_URL: http://promotion-service:18085
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-stockrush}?currentSchema=orders
      SPRING_FLYWAY_SCHEMAS: orders
      SPRING_FLYWAY_DEFAULT_SCHEMA: orders
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_OPEN_IN_VIEW: "false"
      STOCKRUSH_OUTBOX_RELAY_ENABLED: "true"
      STOCKRUSH_OUTBOX_RELAY_FIXED_DELAY_MS: 3000
      STOCKRUSH_OUTBOX_RELAY_INITIAL_DELAY_MS: 1000
      STOCKRUSH_OUTBOX_RELAY_BATCH_SIZE: 50
    depends_on:
      <<: *infra-deps
      promotion-service:
        condition: service_healthy
    ports:
      - "${ORDER_HOST_PORT:-28083}:18083"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18083/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  payment-service:
    build:
      <<: *backend-build
      args:
        SERVICE_DIR: services/payment-service
        SERVICE_PORT: 18084
    environment:
      <<: *backend-env
      SERVER_PORT: 18084
      PAYMENT_SERVICE_PORT: 18084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-stockrush}?currentSchema=payment
      SPRING_FLYWAY_SCHEMAS: payment
      SPRING_FLYWAY_DEFAULT_SCHEMA: payment
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_OPEN_IN_VIEW: "false"
      STOCKRUSH_OUTBOX_RELAY_ENABLED: "true"
      STOCKRUSH_OUTBOX_RELAY_FIXED_DELAY_MS: 3000
      STOCKRUSH_OUTBOX_RELAY_INITIAL_DELAY_MS: 1000
      STOCKRUSH_OUTBOX_RELAY_BATCH_SIZE: 50
    depends_on: *infra-deps
    ports:
      - "${PAYMENT_HOST_PORT:-28084}:18084"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18084/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  promotion-service:
    build:
      <<: *backend-build
      args:
        SERVICE_DIR: services/promotion-service
        SERVICE_PORT: 18085
    environment:
      <<: *backend-env
      SERVER_PORT: 18085
      PROMOTION_SERVICE_PORT: 18085
      PROMOTION_KAFKA_LISTENERS_ENABLED: "true"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-stockrush}?currentSchema=promotion
      SPRING_FLYWAY_SCHEMAS: promotion
      SPRING_FLYWAY_DEFAULT_SCHEMA: promotion
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_OPEN_IN_VIEW: "false"
    depends_on: *infra-deps
    ports:
      - "${PROMOTION_HOST_PORT:-28085}:18085"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18085/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  fulfillment-service:
    build:
      <<: *backend-build
      args:
        SERVICE_DIR: services/fulfillment-service
        SERVICE_PORT: 18086
    environment:
      <<: *backend-env
      SERVER_PORT: 18086
      FULFILLMENT_SERVICE_PORT: 18086
      FULFILLMENT_KAFKA_LISTENERS_ENABLED: "true"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-stockrush}?currentSchema=fulfillment
      SPRING_FLYWAY_SCHEMAS: fulfillment
      SPRING_FLYWAY_DEFAULT_SCHEMA: fulfillment
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_OPEN_IN_VIEW: "false"
    depends_on: *infra-deps
    ports:
      - "${FULFILLMENT_HOST_PORT:-28086}:18086"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18086/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  read-model-service:
    build:
      <<: *backend-build
      args:
        SERVICE_DIR: services/read-model-service
        SERVICE_PORT: 18087
    environment:
      <<: *backend-env
      SERVER_PORT: 18087
      READ_MODEL_SERVICE_PORT: 18087
      READ_MODEL_KAFKA_LISTENERS_ENABLED: "true"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-stockrush}?currentSchema=read_model
      SPRING_FLYWAY_SCHEMAS: read_model
      SPRING_FLYWAY_DEFAULT_SCHEMA: read_model
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_OPEN_IN_VIEW: "false"
    depends_on: *infra-deps
    ports:
      - "${READ_MODEL_HOST_PORT:-28087}:18087"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18087/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  gateway:
    build:
      <<: *backend-build
      args:
        SERVICE_DIR: services/gateway
        SERVICE_PORT: 18080
    environment:
      <<: *demo-keycloak
      GATEWAY_PORT: 18080
      CATALOG_SERVICE_URL: http://catalog-service:18081
      ORDER_SERVICE_URL: http://order-service:18083
      INVENTORY_SERVICE_URL: http://inventory-service:18082
      PAYMENT_SERVICE_URL: http://payment-service:18084
      PROMOTION_SERVICE_URL: http://promotion-service:18085
      FULFILLMENT_SERVICE_URL: http://fulfillment-service:18086
      READ_MODEL_SERVICE_URL: http://read-model-service:18087
    depends_on:
      keycloak:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      promotion-service:
        condition: service_healthy
      fulfillment-service:
        condition: service_healthy
      read-model-service:
        condition: service_healthy
    ports:
      - "${GATEWAY_HOST_PORT:-28080}:18080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18080/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  customer-app:
    build:
      context: ../..
      dockerfile: apps/Dockerfile
      args:
        APP_DIR: customer-app
        VITE_AUTH_ISSUER: http://localhost:${KEYCLOAK_HOST_PORT:-28088}/realms/stockrush
        VITE_AUTH_CLIENT_ID: stockrush-customer-web
    depends_on:
      catalog-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      promotion-service:
        condition: service_healthy
    ports:
      - "${CUSTOMER_APP_HOST_PORT:-15173}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  admin-app:
    build:
      context: ../..
      dockerfile: apps/Dockerfile
      args:
        APP_DIR: admin-app
        VITE_AUTH_ISSUER: http://localhost:${KEYCLOAK_HOST_PORT:-28088}/realms/stockrush
        VITE_AUTH_CLIENT_ID: stockrush-admin-web
    depends_on:
      catalog-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      gateway:
        condition: service_healthy
    ports:
      - "${ADMIN_APP_HOST_PORT:-15174}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  stockrush-demo-postgres-data:
  stockrush-demo-redis-data:
