server:
  port: ${READ_MODEL_SERVICE_PORT:18087}

spring:
  application:
    name: read-model-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:15432}/${POSTGRES_DB:stockrush}?currentSchema=read_model
    username: ${POSTGRES_USER:stockrush}
    password: ${POSTGRES_PASSWORD:stockrush}
  flyway:
    schemas: read_model
    default-schema: read_model
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    consumer:
      group-id: read-model-service
      auto-offset-reset: earliest
      enable-auto-commit: false

stockrush:
  kafka:
    listeners:
      enabled: ${READ_MODEL_KAFKA_LISTENERS_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
