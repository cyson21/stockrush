server:
  port: ${GATEWAY_PORT:18080}

spring:
  application:
    name: gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${STOCKRUSH_SECURITY_ISSUER_URI:http://localhost:28088/realms/stockrush}
          jwk-set-uri: ${STOCKRUSH_SECURITY_JWK_SET_URI:http://localhost:28088/realms/stockrush/protocol/openid-connect/certs}

stockrush:
  routes:
    order-service-url: ${ORDER_SERVICE_URL:http://localhost:18083}
    inventory-service-url: ${INVENTORY_SERVICE_URL:http://localhost:18082}
    payment-service-url: ${PAYMENT_SERVICE_URL:http://localhost:18084}
    promotion-service-url: ${PROMOTION_SERVICE_URL:http://localhost:18085}
    fulfillment-service-url: ${FULFILLMENT_SERVICE_URL:http://localhost:18086}
    read-model-service-url: ${READ_MODEL_SERVICE_URL:http://localhost:18087}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
