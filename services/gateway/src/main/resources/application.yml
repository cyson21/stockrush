server:
  port: ${GATEWAY_PORT:18080}

spring:
  application:
    name: gateway

stockrush:
  routes:
    order-service-url: ${ORDER_SERVICE_URL:http://localhost:18083}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
