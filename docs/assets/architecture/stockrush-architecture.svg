<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" role="img" aria-labelledby="title desc">
  <title id="title">StockRush 아키텍처 개요</title>
  <desc id="desc">StockRush의 클라이언트, 인증, Gateway, 커머스 서비스, Kafka 이벤트 흐름, 서비스별 schema, CI와 로컬 실행 환경을 보여주는 포트폴리오용 아키텍처 다이어그램.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="52%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#eef4f0"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="58%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="event" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-teal" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/>
    </marker>
    <style>
      .page { fill: url(#bg); }
      .title { font: 800 44px "Apple SD Gothic Neo", "Noto Sans KR", Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .subtitle { font: 500 19px "Apple SD Gothic Neo", "Noto Sans KR", Arial, Helvetica, sans-serif; fill: #dbeafe; letter-spacing: 0; }
      .section-title { font: 800 18px "Apple SD Gothic Neo", "Noto Sans KR", Arial, Helvetica, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .section-note { font: 500 13px "Apple SD Gothic Neo", "Noto Sans KR", Arial, Helvetica, sans-serif; fill: #64748b; letter-spacing: 0; }
      .label { font: 800 16px "Apple SD Gothic Neo", "Noto Sans KR", Arial, Helvetica, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .body { font: 500 13px "Apple SD Gothic Neo", "Noto Sans KR", Arial, Helvetica, sans-serif; fill: #475569; letter-spacing: 0; }
      .tiny { font: 700 11px "Apple SD Gothic Neo", "Noto Sans KR", Arial, Helvetica, sans-serif; fill: #64748b; letter-spacing: 0; }
      .hero-note { font: 800 11px "Apple SD Gothic Neo", "Noto Sans KR", Arial, Helvetica, sans-serif; fill: #cbd5e1; letter-spacing: 0; }
      .badge-text { font: 800 12px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .panel { fill: rgba(255,255,255,0.82); stroke: #cbd5e1; stroke-width: 1.2; rx: 8; filter: url(#shadow); }
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 8; }
      .client { stroke: #0891b2; }
      .security { stroke: #4f46e5; }
      .domain { stroke: #0f766e; }
      .data { stroke: #b45309; }
      .runtime { stroke: #64748b; }
      .event-line { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrow-teal); }
      .line { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #94a3b8; stroke-width: 1.8; fill: none; stroke-dasharray: 6 8; marker-end: url(#arrow); }
      .bus { fill: url(#event); rx: 8; }
      .chip { rx: 8; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1600" height="1040"/>

  <rect x="56" y="40" width="1488" height="116" rx="8" fill="url(#titlebar)" filter="url(#shadow)"/>
  <text class="title" x="88" y="94">StockRush 아키텍처</text>
  <text class="subtitle" x="90" y="128">Kafka, Saga, Outbox, OIDC 보안, 운영 화면, 이식형 실행 환경을 갖춘 커머스 플랫폼</text>
  <text class="hero-note" x="1280" y="86">포트폴리오 개요</text>
  <text class="hero-note" x="1280" y="111">백엔드 중심 사이드 프로젝트</text>

  <rect class="panel" x="56" y="188" width="300" height="704"/>
  <text class="section-title" x="84" y="228">사용자 채널</text>
  <text class="section-note" x="84" y="252">백엔드 흐름을 확인하는 제품 화면</text>

  <rect class="node client" x="88" y="292" width="236" height="86"/>
  <circle cx="116" cy="326" r="13" fill="#0891b2"/>
  <text class="badge-text" x="111" y="331">W</text>
  <text class="label" x="142" y="318">고객 웹</text>
  <text class="body" x="142" y="342">React / Vite / MUI</text>
  <text class="tiny" x="142" y="363">주문, 재고, 쿠폰 견적</text>

  <rect class="node client" x="88" y="414" width="236" height="86"/>
  <circle cx="116" cy="448" r="13" fill="#0f766e"/>
  <text class="badge-text" x="111" y="453">A</text>
  <text class="label" x="142" y="440">관리자 웹</text>
  <text class="body" x="142" y="464">React / Vite / MUI</text>
  <text class="tiny" x="142" y="485">주문, Outbox, 재고 운영</text>

  <rect class="node client" x="88" y="536" width="236" height="86"/>
  <circle cx="116" cy="570" r="13" fill="#4f46e5"/>
  <text class="badge-text" x="111" y="575">M</text>
  <text class="label" x="142" y="562">모바일 앱</text>
  <text class="body" x="142" y="586">Expo React Native</text>
  <text class="tiny" x="142" y="607">인증 주문 smoke</text>

  <rect class="node client" x="88" y="690" width="236" height="112"/>
  <text class="label" x="112" y="726">데모 시나리오</text>
  <text class="body" x="112" y="751" font-size="12">CARD / FAIL_CARD / DELAY_CARD</text>
  <text class="body" x="112" y="775">동일 SKU 동시 주문</text>
  <text class="body" x="112" y="799">관리자 취소 + Outbox 복구</text>

  <rect class="panel" x="392" y="188" width="268" height="704"/>
  <text class="section-title" x="420" y="228">인증과 API 경계</text>
  <text class="section-note" x="420" y="252">외부 진입점과 신뢰 경계</text>

  <rect class="node security" x="428" y="302" width="196" height="96"/>
  <text class="label" x="452" y="334">Keycloak</text>
  <text class="body" x="452" y="360">OIDC Authorization Code</text>
  <text class="tiny" x="452" y="381">웹/모바일 PKCE 로그인</text>

  <rect class="node security" x="428" y="474" width="196" height="126"/>
  <text class="label" x="452" y="508">Gateway</text>
  <text class="body" x="452" y="533">Spring Security</text>
  <text class="body" x="452" y="556">JWT Resource Server</text>
  <text class="tiny" x="452" y="579">역할 라우팅, 신뢰 헤더</text>

  <rect class="node security" x="428" y="690" width="196" height="112"/>
  <text class="label" x="452" y="724">보안 기준</text>
  <text class="body" x="452" y="749">ROLE_CUSTOMER / ADMIN</text>
  <text class="body" x="452" y="773">고객 주문 소유권 검사</text>
  <text class="tiny" x="452" y="794">401 / 403 회귀 테스트</text>

  <path class="soft-line" d="M324 335 C372 335, 384 350, 428 350"/>
  <path class="soft-line" d="M324 457 C372 457, 384 350, 428 350"/>
  <path class="soft-line" d="M324 579 C372 579, 384 350, 428 350"/>
  <path class="line" d="M526 398 L526 474"/>

  <rect class="panel" x="696" y="188" width="520" height="704"/>
  <text class="section-title" x="724" y="228">도메인 서비스</text>
  <text class="section-note" x="724" y="252">schema 분리, 데이터 소유권, 이벤트 기반 협업</text>

  <rect class="node domain" x="728" y="302" width="206" height="88"/>
  <text class="label" x="752" y="333">Catalog</text>
  <text class="body" x="752" y="358">상품과 SKU 메타데이터</text>
  <text class="tiny" x="752" y="377">관리자 상품 감사 기록</text>

  <rect class="node domain" x="974" y="302" width="206" height="88"/>
  <text class="label" x="998" y="333">Inventory</text>
  <text class="body" x="998" y="358">재고 선점과 복구</text>
  <text class="tiny" x="998" y="377">row lock + 멱등 처리</text>

  <rect class="node domain" x="728" y="430" width="206" height="104"/>
  <text class="label" x="752" y="462">Order</text>
  <text class="body" x="752" y="487">Saga Orchestrator</text>
  <text class="body" x="752" y="510">멱등 주문 API</text>

  <rect class="node domain" x="974" y="430" width="206" height="104"/>
  <text class="label" x="998" y="462">Payment</text>
  <text class="body" x="998" y="487">승인, 실패, 지연</text>
  <text class="body" x="998" y="510">관리자 취소 흐름</text>

  <rect class="node domain" x="728" y="574" width="206" height="88"/>
  <text class="label" x="752" y="605">Promotion</text>
  <text class="body" x="752" y="630">쿠폰 견적과 사용 이력</text>
  <text class="tiny" x="752" y="649">RESERVED / CONSUMED</text>

  <rect class="node domain" x="974" y="574" width="206" height="88"/>
  <text class="label" x="998" y="605">Fulfillment</text>
  <text class="body" x="998" y="630">OrderConfirmed 소비</text>
  <text class="tiny" x="998" y="649">PREPARING 요청 생성</text>

  <rect class="node domain" x="852" y="706" width="206" height="88"/>
  <text class="label" x="876" y="737">Read Model</text>
  <text class="body" x="876" y="762">고객/관리자 projection</text>
  <text class="tiny" x="876" y="781">검색 가능한 주문 요약</text>

  <path class="line" d="M624 537 C656 537, 662 482, 728 482"/>
  <path class="line" d="M624 537 C660 537, 662 346, 728 346"/>
  <path class="line" d="M624 537 C660 537, 662 618, 728 618"/>
  <path class="line" d="M624 537 C660 537, 690 750, 852 750"/>

  <rect class="panel" x="1252" y="188" width="292" height="704"/>
  <text class="section-title" x="1280" y="228">이벤트, 데이터, 실행환경</text>
  <text class="section-note" x="1280" y="252">복구 가능한 local-first 인프라</text>

  <rect class="bus" x="1280" y="306" width="236" height="116"/>
  <text class="badge-text" x="1306" y="341">Apache Kafka</text>
  <text class="subtitle" x="1306" y="371" font-size="14">주문, 재고, 결제</text>
  <text class="subtitle" x="1306" y="398" font-size="14">command / event</text>

  <rect class="node data" x="1280" y="470" width="236" height="112"/>
  <text class="label" x="1306" y="505">PostgreSQL</text>
  <text class="body" x="1306" y="530">서비스별 schema 분리</text>
  <text class="body" x="1306" y="554">Flyway migrations</text>

  <rect class="node data" x="1280" y="630" width="236" height="92"/>
  <text class="label" x="1306" y="664">Outbox + 처리 이력</text>
  <text class="body" x="1306" y="689">재시도, requeue, 중복 방지</text>
  <text class="tiny" x="1306" y="708">관리자 운영 화면에서 확인</text>

  <rect class="node runtime" x="1280" y="768" width="236" height="86"/>
  <text class="label" x="1306" y="800">이식형 실행환경</text>
  <text class="body" x="1306" y="825">Docker Compose / kind</text>
  <text class="tiny" x="1306" y="844">GitHub Actions + GHCR + Trivy</text>

  <path class="event-line" d="M1180 346 C1218 346, 1238 346, 1280 348"/>
  <path class="event-line" d="M1180 482 C1238 482, 1246 396, 1280 384"/>
  <path class="event-line" d="M1180 618 C1242 618, 1250 420, 1280 404"/>
  <path class="event-line" d="M1058 750 C1220 750, 1246 438, 1280 410"/>
  <path class="soft-line" d="M831 390 C980 450, 1128 514, 1280 526"/>
  <path class="soft-line" d="M1077 390 C1148 438, 1204 502, 1280 526"/>
  <path class="soft-line" d="M831 534 C984 564, 1122 574, 1280 526"/>
  <path class="soft-line" d="M1077 534 C1140 548, 1202 544, 1280 526"/>
  <path class="soft-line" d="M831 662 C990 646, 1132 596, 1280 526"/>
  <path class="soft-line" d="M1077 662 C1154 628, 1218 580, 1280 526"/>
  <path class="soft-line" d="M955 706 C1086 636, 1194 574, 1280 526"/>
  <path class="soft-line" d="M1398 422 L1398 470"/>
  <path class="soft-line" d="M1398 582 L1398 630"/>
  <path class="soft-line" d="M1398 722 L1398 768"/>

  <rect x="696" y="916" width="848" height="74" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
  <rect class="chip" x="724" y="936" width="122" height="30" fill="#0f766e"/>
  <text class="badge-text" x="742" y="956">정상 흐름</text>
  <text class="body" x="862" y="956">OrderCreated -> Reserved -> Authorized -> Confirmed</text>
  <text class="tiny" x="862" y="975">Fulfillment와 Read Model은 확정 주문 이벤트를 소비한다.</text>
  <rect class="chip" x="1226" y="936" width="130" height="30" fill="#b45309"/>
  <text class="badge-text" x="1244" y="956">실패 흐름</text>
  <text class="body" x="1372" y="956">취소, 재고 복구, 재처리</text>

  <rect x="56" y="916" width="604" height="74" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text class="label" x="84" y="948">검증 게이트</text>
  <text class="body" x="84" y="973">Maven, Vitest, mobile typecheck, Architecture Guard, demo smoke, kind smoke, secret scan</text>
</svg>
