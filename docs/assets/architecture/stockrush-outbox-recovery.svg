<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img">

  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="58%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef4f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-teal" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/>
    </marker>
    <style>
      .page { fill: url(#bg); }
      .hero { fill: url(#hero); filter: url(#shadow); }
      .title { font: 800 40px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .subtitle { font: 600 18px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #dbeafe; letter-spacing: 0; }
      .section { font: 800 20px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .label { font: 800 17px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .body { font: 500 14px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .tiny { font: 700 12px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #64748b; letter-spacing: 0; }
      .white { fill: #ffffff; }
      .panel { fill: rgba(255,255,255,0.86); stroke: #cbd5e1; stroke-width: 1.2; rx: 8; filter: url(#shadow); }
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .teal { stroke: #0f766e; }
      .blue { stroke: #2563eb; }
      .orange { stroke: #b45309; }
      .violet { stroke: #4f46e5; }
      .slate { stroke: #64748b; }
      .chip { rx: 8; }
      .chipText { font: 800 13px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .line { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .event { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrow-teal); }
      .dash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 7 8; marker-end: url(#arrow); }
    </style>
  </defs>
<rect class="page" x="0" y="0" width="1400" height="900"/>
<rect class="hero" x="48" y="36" width="1304" height="112" rx="8"/>
<text class="title" x="82" y="90">Outbox 복구 흐름</text>
<text class="subtitle" x="84" y="124">Kafka 발행 실패와 중복 수신을 운영 가능한 상태로 남기는 구조</text>

<rect class="panel" x="64" y="188" width="1272" height="620"/>
<rect class="node teal" x="96" y="300" width="220" height="110"/>
<text class="label" x="120" y="332">서비스 트랜잭션</text>
<text class="body" x="120" y="356">도메인 상태 저장</text>
<text class="body" x="120" y="380">Outbox row 저장</text>
<text class="body" x="120" y="404">같은 DB 트랜잭션</text>
<rect class="node teal" x="374" y="300" width="210" height="110"/>
<text class="label" x="398" y="332">Outbox Table</text>
<text class="body" x="398" y="356">PENDING</text>
<text class="body" x="398" y="380">retry_count</text>
<text class="body" x="398" y="404">error_message</text>
<rect class="node blue" x="642" y="300" width="210" height="110"/>
<text class="label" x="666" y="332">Relay Scheduler</text>
<text class="body" x="666" y="356">claim</text>
<text class="body" x="666" y="380">publish</text>
<text class="body" x="666" y="404">상태 전이</text>
<rect class="node blue" x="910" y="300" width="190" height="110"/>
<text class="label" x="934" y="332">Apache Kafka</text>
<text class="body" x="934" y="356">topic 발행</text>
<text class="body" x="934" y="380">partition key</text>
<rect class="node teal" x="1154" y="300" width="150" height="110"/>
<text class="label" x="1178" y="332">Consumer</text>
<text class="body" x="1178" y="356">processed</text>
<text class="body" x="1178" y="380">중복 방지</text>
<path class="line" d="M316 356 L374 356"/>
<path class="line" d="M584 356 L642 356"/>
<path class="event" d="M852 356 L910 356"/>
<path class="event" d="M1100 356 L1154 356"/>

<text class="section" x="96" y="500">실패 시 운영 경로</text>
<rect class="node orange" x="96" y="552" width="250" height="106"/>
<text class="label" x="120" y="584">발행 실패</text>
<text class="body" x="120" y="608">PENDING 재시도</text>
<text class="body" x="120" y="632">한계 초과 시 FAILED</text>
<rect class="node orange" x="408" y="552" width="250" height="106"/>
<text class="label" x="432" y="584">관리자 화면</text>
<text class="body" x="432" y="608">FAILED 조회</text>
<text class="body" x="432" y="632">retry / requeue</text>
<rect class="node teal" x="720" y="552" width="250" height="106"/>
<text class="label" x="744" y="584">재처리</text>
<text class="body" x="744" y="608">FAILED -> PENDING</text>
<text class="body" x="744" y="632">에러 정보 초기화</text>
<rect class="node slate" x="1032" y="552" width="250" height="106"/>
<text class="label" x="1056" y="584">감사 기록</text>
<text class="body" x="1056" y="608">operator id</text>
<text class="body" x="1056" y="632">admin action row</text>
<path class="dash" d="M346 606 L408 606"/>
<path class="dash" d="M658 606 L720 606"/>
<path class="dash" d="M970 606 L1032 606"/>

<rect class="chip" x="96" y="728" width="152" height="34" fill="#0f766e"/>
<text class="chipText" x="118" y="751">설계 포인트</text>
<text class="body" x="270" y="751">장애를 숨기지 않고 조회 가능한 상태로 남겨 재시도, requeue, 감사 로그로 이어지게 한다.</text>

</svg>
