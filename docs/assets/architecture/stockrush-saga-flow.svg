<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img">

  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="58%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef4f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-teal" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/>
    </marker>
    <style>
      .page { fill: url(#bg); }
      .hero { fill: url(#hero); filter: url(#shadow); }
      .title { font: 800 40px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .subtitle { font: 600 18px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #dbeafe; letter-spacing: 0; }
      .section { font: 800 20px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .label { font: 800 17px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .body { font: 500 14px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .tiny { font: 700 12px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #64748b; letter-spacing: 0; }
      .white { fill: #ffffff; }
      .panel { fill: rgba(255,255,255,0.86); stroke: #cbd5e1; stroke-width: 1.2; rx: 8; filter: url(#shadow); }
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .teal { stroke: #0f766e; }
      .blue { stroke: #2563eb; }
      .orange { stroke: #b45309; }
      .violet { stroke: #4f46e5; }
      .slate { stroke: #64748b; }
      .chip { rx: 8; }
      .chipText { font: 800 13px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .line { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .event { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrow-teal); }
      .dash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 7 8; marker-end: url(#arrow); }
    </style>
  </defs>
<rect class="page" x="0" y="0" width="1400" height="900"/>
<rect class="hero" x="48" y="36" width="1304" height="112" rx="8"/>
<text class="title" x="82" y="90">주문 Saga 흐름</text>
<text class="subtitle" x="84" y="124">성공, 실패, 지연 결제 취소가 하나의 상태 전이로 수렴하는 흐름</text>

<rect class="panel" x="64" y="188" width="1272" height="620"/>
<text class="section" x="94" y="230">CARD 정상 흐름</text>
<text class="tiny" x="94" y="254">Order Service가 Saga 중심을 잡고, Inventory와 Payment는 결과 이벤트를 돌려준다.</text>
<rect class="node blue" x="96" y="300" width="170" height="92"/>
<text class="label" x="120" y="332">고객 앱</text>
<text class="body" x="120" y="356">주문 생성</text>
<text class="body" x="120" y="380">Idempotency-Key</text>
<rect class="node violet" x="306" y="300" width="170" height="92"/>
<text class="label" x="330" y="332">Gateway</text>
<text class="body" x="330" y="356">JWT 검증</text>
<text class="body" x="330" y="380">subject 전달</text>
<rect class="node teal" x="516" y="300" width="178" height="92"/>
<text class="label" x="540" y="332">Order</text>
<text class="body" x="540" y="356">OrderCreated</text>
<text class="body" x="540" y="380">Saga STARTED</text>
<rect class="node teal" x="734" y="300" width="178" height="92"/>
<text class="label" x="758" y="332">Inventory</text>
<text class="body" x="758" y="356">재고 선점</text>
<text class="body" x="758" y="380">Reserved</text>
<rect class="node teal" x="952" y="300" width="178" height="92"/>
<text class="label" x="976" y="332">Payment</text>
<text class="body" x="976" y="356">결제 승인</text>
<text class="body" x="976" y="380">Authorized</text>
<rect class="node teal" x="1160" y="300" width="128" height="92"/>
<text class="label" x="1184" y="332">완료</text>
<text class="body" x="1184" y="356">CONFIRMED</text>
<text class="body" x="1184" y="380">COMPLETED</text>
<path class="line" d="M266 346 L306 346"/>
<path class="line" d="M476 346 L516 346"/>
<path class="event" d="M694 346 L734 346"/>
<path class="event" d="M912 346 L952 346"/>
<path class="event" d="M1130 346 L1160 346"/>

<text class="section" x="94" y="480">실패/복구 흐름</text>
<rect class="node orange" x="96" y="532" width="246" height="96"/>
<text class="label" x="120" y="564">재고 부족</text>
<text class="body" x="120" y="588">InventoryReservationFailed</text>
<text class="body" x="120" y="612">주문 CANCELLED</text>
<rect class="node orange" x="394" y="532" width="246" height="96"/>
<text class="label" x="418" y="564">결제 실패</text>
<text class="body" x="418" y="588">PaymentAuthorizationFailed</text>
<text class="body" x="418" y="612">예약 재고 복구</text>
<rect class="node orange" x="692" y="532" width="246" height="96"/>
<text class="label" x="716" y="564">지연 결제</text>
<text class="body" x="716" y="588">PaymentAuthorizationDelayed</text>
<text class="body" x="716" y="612">관리자 취소 대기</text>
<rect class="node slate" x="990" y="532" width="246" height="96"/>
<text class="label" x="1014" y="564">관리자 취소</text>
<text class="body" x="1014" y="588">PaymentCancelRequested</text>
<text class="body" x="1014" y="612">PaymentCanceled</text>
<path class="dash" d="M342 580 L394 580"/>
<path class="dash" d="M640 580 L692 580"/>
<path class="dash" d="M938 580 L990 580"/>

<rect class="chip" x="96" y="708" width="152" height="34" fill="#0f766e"/>
<text class="chipText" x="118" y="731">핵심 검증</text>
<text class="body" x="270" y="731">동일 SKU 동시 주문, 대량 멱등성 replay, DELAY_CARD 관리자 취소, 최종 Outbox 잔여분 0</text>

</svg>
