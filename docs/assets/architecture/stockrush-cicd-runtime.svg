<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img">

  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="58%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef4f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-teal" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/>
    </marker>
    <style>
      .page { fill: url(#bg); }
      .hero { fill: url(#hero); filter: url(#shadow); }
      .title { font: 800 40px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .subtitle { font: 600 18px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #dbeafe; letter-spacing: 0; }
      .section { font: 800 20px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .label { font: 800 17px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .body { font: 500 14px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .tiny { font: 700 12px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #64748b; letter-spacing: 0; }
      .white { fill: #ffffff; }
      .panel { fill: rgba(255,255,255,0.86); stroke: #cbd5e1; stroke-width: 1.2; rx: 8; filter: url(#shadow); }
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .teal { stroke: #0f766e; }
      .blue { stroke: #2563eb; }
      .orange { stroke: #b45309; }
      .violet { stroke: #4f46e5; }
      .slate { stroke: #64748b; }
      .chip { rx: 8; }
      .chipText { font: 800 13px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .line { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .event { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrow-teal); }
      .dash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 7 8; marker-end: url(#arrow); }
    </style>
  </defs>
<rect class="page" x="0" y="0" width="1400" height="900"/>
<rect class="hero" x="48" y="36" width="1304" height="112" rx="8"/>
<text class="title" x="82" y="90">CI/CD와 실행 환경</text>
<text class="subtitle" x="84" y="124">개인 AWS 없이 GitHub Actions, GHCR, Docker Compose, kind로 재현 가능한 배포 흐름</text>

<rect class="panel" x="64" y="188" width="1272" height="620"/>
<rect class="node slate" x="96" y="300" width="180" height="106"/>
<text class="label" x="120" y="332">main push</text>
<text class="body" x="120" y="356">문서/코드 변경</text>
<text class="body" x="120" y="380">GitHub trigger</text>
<rect class="node blue" x="326" y="300" width="214" height="106"/>
<text class="label" x="350" y="332">CI</text>
<text class="body" x="350" y="356">Maven / Vitest</text>
<text class="body" x="350" y="380">mobile typecheck</text>
<text class="body" x="350" y="404">Architecture Guard</text>
<rect class="node orange" x="590" y="300" width="214" height="106"/>
<text class="label" x="614" y="332">보안 게이트</text>
<text class="body" x="614" y="356">secret scan</text>
<text class="body" x="614" y="380">Trivy fs scan</text>
<text class="body" x="614" y="404">AWS 사용 차단</text>
<rect class="node teal" x="854" y="300" width="214" height="106"/>
<text class="label" x="878" y="332">Release Images</text>
<text class="body" x="878" y="356">Docker build</text>
<text class="body" x="878" y="380">GHCR push</text>
<text class="body" x="878" y="404">image scan</text>
<rect class="node teal" x="1118" y="300" width="170" height="106"/>
<text class="label" x="1142" y="332">Local Deploy</text>
<text class="body" x="1142" y="356">compose</text>
<text class="body" x="1142" y="380">kind smoke</text>
<path class="line" d="M276 354 L326 354"/>
<path class="line" d="M540 354 L590 354"/>
<path class="line" d="M804 354 L854 354"/>
<path class="line" d="M1068 354 L1118 354"/>

<text class="section" x="96" y="506">로컬 재현 경로</text>
<rect class="node teal" x="96" y="552" width="260" height="106"/>
<text class="label" x="120" y="584">Docker Compose Demo</text>
<text class="body" x="120" y="608">인프라 + 서비스 + 웹앱</text>
<text class="body" x="120" y="632">macOS / Windows 11</text>
<rect class="node teal" x="426" y="552" width="260" height="106"/>
<text class="label" x="450" y="584">kind Kubernetes</text>
<text class="body" x="450" y="608">GHCR image 배포</text>
<text class="body" x="450" y="632">Gateway / Keycloak smoke</text>
<rect class="node slate" x="756" y="552" width="260" height="106"/>
<text class="label" x="780" y="584">Runbook</text>
<text class="body" x="780" y="608">실행/점검/종료 명령</text>
<text class="body" x="780" y="632">포트와 준비물 정리</text>
<rect class="node orange" x="1086" y="552" width="190" height="106"/>
<text class="label" x="1110" y="584">Non-goal</text>
<text class="body" x="1110" y="608">회사 AWS 미사용</text>
<text class="body" x="1110" y="632">개인 cloud 의존 없음</text>
<path class="dash" d="M356 606 L426 606"/>
<path class="dash" d="M686 606 L756 606"/>
<path class="dash" d="M1016 606 L1086 606"/>

<rect class="chip" x="96" y="730" width="152" height="34" fill="#0f766e"/>
<text class="chipText" x="118" y="753">설명 포인트</text>
<text class="body" x="270" y="753">빌드 검증, 이미지 발행, 로컬 배포 smoke가 분리되어 어디서 실패했는지 설명할 수 있다.</text>

</svg>
